api:
  url: "https://openrouter.ai/api/v1/chat/completions"
  key_env_var: "OPENROUTER_API_KEY"
  referer: "https://github.com/tomsouri/notes2audio"
  timeout: 60
  temperature: 0.1
  models:
    summary: "openai/gpt-4o-mini"
    rewrite: "openai/gpt-4o-mini"
  cost_per_1m_tokens:
    input: 0.075
    output: 0.30

prompts:
  summary_system: |
    You are an expert at analyzing raw, messy study notes.
    Provide a single, extremely brief sentence in {language} summarizing the core topics of the provided raw text.
    Ignore formatting issues and focus only on high-level subjects.
  rewrite_system: |
    You are an expert tutor preparing audio-learning materials. Rewrite the provided study notes into a natural, fluid, spoken-word script in {language}.

    Important Input Handling:
    1. The input contains a <context> block providing summaries of surrounding parts for continuity. Do NOT include any of this context or information from the summaries in your output.
    2. The input contains a <text_to_rewrite> block. This is the ONLY text you should rewrite.

    Strictly follow these rules:
    1. Convert all bullet points/lists into coherent, complete sentences.
    2. Keep terminology accurate, but explain abbreviations if necessary for clarity.
    3. Use a helpful, educational, and steady tone suitable for listening.
    4. Remove visual markers like hyphens, bullets, or 'o' characters.
    5. If there are clearly structured headers, use them to create smooth transitions.
    6. Output ONLY the final script text derived from <text_to_rewrite>. Do not include tags, headers, or any part of the provided context.
  context_before: "Summaries of previous parts:"
  context_after: "Summaries of upcoming parts:"
  chunk_intro: "This is part {index} of {total}."
  qa_system_maybe: |
    The end of the input may contain questions and answers. If it does, handle it as follows:
    1. Identify the questions and their corresponding answers.
    2. For each question, provide it clearly.
    3. After each question, insert the marker [PAUSE].
    4. Then provide the answer.
    5. Maintain this Q - [PAUSE] - A structure for all question-answer pairs.
  qa_system_last_chunk: |


    The end of the provided input contains a section with questions and answers. Handle it as follows:
    1. Identify the questions and their corresponding answers.
    2. For each question, provide it clearly.
    3. After each question, insert the marker [PAUSE].
    4. Then provide the answer.
    5. Maintain this Q - [PAUSE] - A structure for all question-answer pairs.

processing:
  max_api_chunk_chars: 5000
  max_tts_chunk_chars: 3000
  max_concurrent_tasks: 5
  cleanup_replacements:
    - ["*", ""]
    - ["#", ""]
  pause_duration: "3s"

defaults:
  language: "Czech"
  voice: "cs-CZ-AntoninNeural"
  rate: "-20%"
  output_dir: "audio"
  filename_pattern: "{stem}.part{index:02d}.mp3"

  # Add more voices for other languages (supported by Edge TTS) as needed
  available_voices:
    - "cs-CZ-VlastaNeural"
    - "cs-CZ-AntoninNeural"
